<style id="wp-custom-css">
.page .entry-title {
    display: none;
}
.sticky-header {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    z-index: 9999;
    background: white; /* change if needed */
}
html {
  scroll-behavior: smooth;
}

body{
	padding: 0 !important;
}

a {
  text-decoration: none !important;
}

a:hover {
  text-decoration: none !important;
}

/* ===== ROW STRUCTURE ===== */

.custom-contact-form .form-row {
    display: flex;
    gap: 20px;
    margin-bottom:20px;
}

.custom-contact-form .form-row.single {
    flex-direction: column;
}

.custom-contact-form .form-group {
    flex: 1;
}


/* ===== LABEL STYLE ===== */

.custom-contact-form label {
    display: block;
    margin-bottom:8px;
    font-weight: 500 !important;
    color: #222222;
}


/* ===== INPUT + SELECT + TEXTAREA ===== */

.custom-contact-form input,
.custom-contact-form select,
.custom-contact-form textarea {
    width: 100%;
    padding: 9px 14px;
    height: 44px;
    border-radius: 8px !important;
    border: 1px solid #ddd !important;
    box-sizing: border-box;
}

.custom-contact-form textarea {
    height: 150px;
    min-height: 60px;
    resize: vertical;
}


/* ===== SELECT DROPDOWN FIX ===== */

.custom-contact-form select {
    appearance: none;
    background-position: right 12px center;
}


/* ===== SUBMIT BUTTON ===== */

.custom-contact-form .form-submit {
    margin-top: 15px;
}

.custom-contact-form input[type="submit"] {
    width: 100%;
    background: #0D2533 !important;
    color: #fff !important;
    border: none !important;
    padding: 18px 25px !important
    border-radius: 10px !important;
    font-weight: 600 !important;
    cursor: pointer !important;
    height: auto !important;
} 


/* ===== REMOVE CONTACT FORM 7 EXTRA SPACING ===== */

.custom-contact-form p {
    margin-bottom: 0 !important;
}

.custom-contact-form br {
    display: none;
}


/* ===== RESPONSIVE (MOBILE) ===== */

@media (max-width: 768px) {
    .custom-contact-form .form-row {
        flex-direction: column;
    }
}

/* Dropdown text dark */
.custom-contact-form select {
    color: #000 !important;   /* main selected text */
}

/* Dropdown options color */
.custom-contact-form select option {
    color: #000 !important;
    background-color: #fff !important;
}

.custom-contact-form select option:checked {
    background-color: #FA5221 !important;
    color: #fff !important;
}

.lang-dropdown { position: relative; display: inline-block;
}

.lang-menu {
  display: none;
  position: absolute;
  background: #fff;
  min-width: 120px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
	
}
.lang-menu a {
  display: block;
  padding: 8px 12px;
  text-decoration: none;
  color: #000;
	border-radius:50%

	
}
.lang-dropdown:hover .lang-menu {
  display: block;
}

/* Rounded Button */
.lang-dropdown button {
  border-radius: 50px;        /* Fully rounded pill */
  padding: 10px 20px;
  border: 1px solid #E0E0E0;
  background: none;        /* Change color if needed */
  color: #ffffff;
  cursor: pointer;
}


/* Fix Mega Menu Panel Width */
#mega-menu-wrap-menu-1 #mega-menu-menu-1[data-effect="fade"] li.mega-menu-item > ul.mega-sub-menu {
    width: 420px !important;
		padding: 30px;		
}

#mega-menu-wrap-menu-1 #mega-menu-menu-1 li.mega-menu-column-standard h4.mega-block-title, #mega-menu-wrap-menu-1 #mega-menu-menu-1 li.mega-menu-column > ul.mega-sub-menu > li.mega-menu-item h4.mega-block-title {
       font-family: 'DM Sans', sans-serif !important;
   }

#mega-menu-wrap-menu-1 #mega-menu-menu-1 li.mega-menu-column-standard > a.mega-menu-link, #mega-menu-wrap-menu-1 #mega-menu-menu-1 li.mega-menu-column > ul.mega-sub-menu > li.mega-menu-item > a.mega-menu-link {
    white-space: nowrap !important;
}

#mega-menu-wrap-menu-1 #mega-menu-menu-1 li.mega-menu-column-standard, #mega-menu-wrap-menu-1 #mega-menu-menu-1 li.mega-menu-column > ul.mega-sub-menu > li.mega-menu-item {
      font-family: 'DM Sans', sans-serif !important;
   
}

@media (max-width: 768px) {
	
	#mega-menu-wrap-menu-1 #mega-menu-menu-1[data-effect="fade"] li.mega-menu-item > ul.mega-sub-menu {
		width:100% !important;
	}
	
}

<script>
        const centerHub = { x: 480, y: 280 }; 
        
        const worldNodes = [
            { x: 465, y: 110 }, { x: 560, y: 210 },
            { x: 470, y: 1440 }, { x: 840, y: 180 },
            { x: 1200, y: 160 }, { x: 760, y: 310 },
            { x: 880, y: 430 }, { x: 260, y: 380 },
            { x: 80, y: 110 },   { x: 460, y: 140 },
            { x: 770, y: 270 }, { x: 810, y: 360 },
            { x: 500, y: 200 }, { x: 520, y: 150 },
            { x: 240, y: 450 }, { x: 200, y: 430 },
            { x: 450, y: 320 }
        ];

        function initLogistics() {
            const container = document.getElementById('master-routes');
            
            worldNodes.forEach((node) => {
                const dx = node.x - centerHub.x;
                const dy = node.y - centerHub.y;
                const cp1x = centerHub.x + dx * 0.5 - (dy * 0.15);
                const cp1y = centerHub.y + dy * 0.5 + (dx * 0.15);
                const pathData = `M ${centerHub.x} ${centerHub.y} Q ${cp1x} ${cp1y} ${node.x} ${node.y}`;

                const line = document.createElementNS("http://www.w3.org/2000/svg", "path");
                line.setAttribute("d", pathData);
                line.setAttribute("class", "route-line");
                container.appendChild(line);

                const pointGroup = document.createElementNS("http://www.w3.org/2000/svg", "g");
                pointGroup.setAttribute("class", "data-point");
                pointGroup.style.setProperty('--path', `"${pathData}"`);
                pointGroup.style.animationDelay = `${Math.random() * 5}s`;

                const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                circle.setAttribute("r", "5.5");
                circle.setAttribute("fill", "#0284c7");
                circle.setAttribute("style", "filter: drop-shadow(0 0 3px #0ea5e9);");
                
                pointGroup.appendChild(circle);
                container.appendChild(pointGroup);

                const term = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                term.setAttribute("cx", node.x);
                term.setAttribute("cy", node.y);
                term.setAttribute("r", "1.5");
                term.setAttribute("fill", "#94a3b8");
                container.appendChild(term);
            });
        }

        window.onload = initLogistics;
    </script>
